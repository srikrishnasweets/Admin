<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Master</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<style>
:root{
  --bg-1:#f4f8ff;
  --bg-2:#e9f1ff;
  --panel:#ffffff;
  --ink:#0f223a;
  --muted:#556981;
  --line:#c9d8eb;
  --accent:#1e6fd9;
  --shadow:0 8px 20px rgba(22,56,94,.14);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:"DM Sans","Segoe UI",sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at 10% 0%, #d5e6ff 0%, transparent 35%),
    radial-gradient(circle at 90% 90%, #dfe9ff 0%, transparent 30%),
    linear-gradient(125deg,var(--bg-1),var(--bg-2));
}

.page{
  padding:12px;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.hero{
  background:linear-gradient(145deg,#ffffff,#eef5ff);
  border:1px solid var(--line);
  border-radius:22px;
  padding:12px 18px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.hero-title{
  margin:0;
  color:var(--accent);
  font-size:26px;
  font-weight:800;
}

.controls{
  display:flex;
  align-items:center;
  gap:8px;
}

.nav-btn{
  border:1px solid var(--line);
  background:#f4f8ff;
  color:#123a67;
  border-radius:10px;
  padding:8px 12px;
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.jump-select{
  border:1px solid var(--line);
  background:white;
  padding:6px 10px;
  border-radius:8px;
  font-weight:600;
}

.viewer{
  margin-top:12px;
  flex:1;
  overflow-y:auto;
  position:relative;
}

.slider{
  display:flex;
  flex-direction:column;
  gap:12px;
  padding:4px;
}

.slide{
  min-width:0;
  padding:0;
}

.section-table-card{
  height:auto;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  box-shadow:var(--shadow);
}

.section-head{
  background:#eaf3ff;
  padding:10px 14px;
  font-weight:800;
  color:#133a67;
}

.section-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

.section-table th,
.section-table td{
  border:1px solid var(--line);
  padding:8px 10px;
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.section-table thead th{
  background:#eaf3ff;
  font-weight:800;
  text-transform:uppercase;
}

.section-table td.num{text-align:right}

/* column widths desktop */
.col-product{width:30%}
.col-packed,.col-tray,.col-total{width:10%}
.col-time{width:12%}

/* completed row */
.completed-product-row td{
  background:#28A745;
  color:#fff;
  font-weight:700;
}

/* ===== MOBILE COMPACT MODE ===== */
.mobile-status{display:none}

@media (max-width:768px){

  /* hide heavy columns */
  .col-packed,
  .col-tray,
  .col-packed-status,
  .col-tray-status{
    display:none !important;
  }

  .mobile-status{
    display:table-cell !important;
  }

  /* mobile widths */
  .col-product{width:45%}
  .col-total{width:20%}
  .col-status{width:20%}
  .col-time{width:15%}

  .section-table th,
  .section-table td{
    font-size:13px;
    padding:7px 8px;
  }
}

.empty{
  padding:40px;
  text-align:center;
  color:var(--muted);
  font-weight:700;
}
</style>
</head>

<body>

<main class="page">

<header class="hero">
  <h1 class="hero-title">Master</h1>

  <div class="controls">
    <button id="prevBtn" class="nav-btn"><i class="bi bi-chevron-up"></i></button>
    <select id="jumpSelect" class="jump-select"></select>
    <button id="nextBtn" class="nav-btn"><i class="bi bi-chevron-down"></i></button>
  </div>
</header>

<section class="viewer">
  <div id="slider" class="slider"></div>
</section>

</main>

<script>
const API_URL="https://script.google.com/macros/s/AKfycby0t1hNhPtflVTcqay2cooBSRawRDt6mgWPyMYisfS8TmqUo47U6nlDhVXhGlJ6g092HA/exec";
const SECTION_ORDER=[
  "MYSURPA",
  "SPECIAL MILK",
  "MILK",
  "SPECIAL KAJU",
  "KAJU",
  "GHEE",
  "SOANPAPDI",
  "HALWA",
  "LADDU",
  "BITES",
  "BENGALI",
  "BAKLAVA"
];

let sectionKeys=[],sectionNodes=[],activeIndex=0;

const viewer=document.querySelector(".viewer");
const slider=document.getElementById("slider");
const prevBtn=document.getElementById("prevBtn");
const nextBtn=document.getElementById("nextBtn");
const jumpSelect=document.getElementById("jumpSelect");

function normalizeKey(v){return String(v??"").toLowerCase().replace(/[^a-z0-9]/g,"")}
function getVal(row,a){const k=a.map(normalizeKey);const f=Object.keys(row).find(x=>k.includes(normalizeKey(x)));return f?row[f]:""}

const getSection=r=>String(getVal(r,["section"])).trim();
const getProduct=r=>String(getVal(r,["product"])).trim();
const getPacked=r=>getVal(r,["packed"]);
const getTray=r=>getVal(r,["tray"]);
const getTotal=r=>getVal(r,["total"]);
const getPackedStatus=r=>getVal(r,["packedStatus"]);
const getTrayStatus=r=>getVal(r,["trayStatus"]);

const getTime=r=>{
  const raw=getVal(r,["time","timestamp"]);
  if(!raw) return "";
  const d=new Date(raw);
  if(isNaN(d)) return raw;
  return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
};

const isCompleted=v=>{
  const s=String(v||"").toLowerCase();
  return s==="done"||s==="complete"||s==="completed";
};

function calculateSectionTotals(rows){
  let packedSum=0,traySum=0,totalSum=0;
  let packedCompletedQty=0,trayCompletedQty=0,totalCompletedQty=0;

  rows.forEach(r=>{
    const packed=parseFloat(getPacked(r))||0;
    const tray=parseFloat(getTray(r))||0;
    const total=parseFloat(getTotal(r))||0;

    packedSum+=packed;
    traySum+=tray;
    totalSum+=total;

    if(isCompleted(getPackedStatus(r))) packedCompletedQty+=packed;
    if(isCompleted(getTrayStatus(r))) trayCompletedQty+=tray;
    if(isCompleted(getPackedStatus(r))&&isCompleted(getTrayStatus(r))) totalCompletedQty+=total;
  });

  return {
    packedCompletedQty,
    trayCompletedQty,
    totalCompletedQty,
    packedBalanceQty:packedSum-packedCompletedQty,
    trayBalanceQty:traySum-trayCompletedQty,
    totalBalanceQty:totalSum-totalCompletedQty
  };
}

function groupRows(rows){
  const map=new Map();
  rows.forEach(r=>{
    const sec=getSection(r);
    if(!sec) return;
    if(!map.has(sec)) map.set(sec,[]);
    map.get(sec).push(r);
  });
  return map;
}

const sectionOrderRank=new Map(SECTION_ORDER.map((name,i)=>[normalizeKey(name),i]));

function sortSectionEntries(entries){
  return entries
    .map(([sec,items],originalIndex)=>({
      sec,
      items,
      originalIndex,
      rank:sectionOrderRank.has(normalizeKey(sec))
        ?sectionOrderRank.get(normalizeKey(sec))
        :Number.MAX_SAFE_INTEGER
    }))
    .sort((a,b)=>(a.rank-b.rank)||(a.originalIndex-b.originalIndex))
    .map(({sec,items})=>[sec,items]);
}

function buildTable(rows){
  const totals=calculateSectionTotals(rows);

  return `
  <table class="section-table">
    <thead>
      <tr>
        <th class="col-product">Product</th>
        <th class="col-packed num">Packed</th>
        <th class="col-tray num">Tray</th>
        <th class="col-total num">Total</th>
        <th class="col-packed-status">Packed Status</th>
        <th class="col-tray-status">Tray Status</th>
        <th class="mobile-status col-status">Status</th>
        <th class="col-time">Time</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(r=>{
        const packedDone=isCompleted(getPackedStatus(r));
        const trayDone=isCompleted(getTrayStatus(r));
        const done=packedDone&&trayDone;
        const mobileStatus=done?"COMPLETED":"PENDING";

        return `
        <tr class="${done?"completed-product-row":""}">
          <td class="col-product">${getProduct(r)||"-"}</td>
          <td class="col-packed num">${getPacked(r)||"0"}</td>
          <td class="col-tray num">${getTray(r)||"0"}</td>
          <td class="col-total num">${getTotal(r)||"0"}</td>
          <td class="col-packed-status">${getPackedStatus(r)||"Pending"}</td>
          <td class="col-tray-status">${getTrayStatus(r)||"Pending"}</td>
          <td class="mobile-status col-status">${mobileStatus}</td>
          <td class="col-time">${getTime(r)}</td>
        </tr>`;
      }).join("")}

      <tr class="section-summary-row">
        <td class="col-product"><strong>COMPLETED–BALANCE</strong></td>
        <td class="col-packed num"><strong>${totals.packedCompletedQty.toFixed(2)} – ${totals.packedBalanceQty.toFixed(2)}</strong></td>
        <td class="col-tray num"><strong>${totals.trayCompletedQty.toFixed(2)} – ${totals.trayBalanceQty.toFixed(2)}</strong></td>
        <td class="col-total num"><strong>${totals.totalCompletedQty.toFixed(2)} – ${totals.totalBalanceQty.toFixed(2)}</strong></td>
        <td class="col-packed-status"></td>
        <td class="col-tray-status"></td>
        <td class="col-time"></td>
      </tr>
    </tbody>
  </table>`;
}

function render(rows){
  if(!rows.length){
    slider.innerHTML='<div class="empty">No data</div>';
    jumpSelect.innerHTML="";
    sectionKeys=[];
    sectionNodes=[];
    activeIndex=0;
    return;
  }
  const entries=sortSectionEntries([...groupRows(rows).entries()]);
  sectionKeys=entries.map(e=>e[0]);

  slider.innerHTML=entries.map(([sec,items],i)=>`
      <div class="slide">
        <article class="section-table-card" data-index="${i}">
          <div class="section-head">${sec.toUpperCase()}</div>
          ${buildTable(items)}
        </article>
      </div>`).join("");

  sectionNodes=[...slider.querySelectorAll(".section-table-card")];
  activeIndex=0;
  jumpSelect.innerHTML=sectionKeys.map((s,i)=>`<option value="${i}">${s}</option>`).join("");
  jumpSelect.value=String(activeIndex);
  viewer.scrollTop=0;
}

function goTo(i){
  if(!sectionNodes.length) return;
  const next=Math.max(0,Math.min(i,sectionNodes.length-1));
  activeIndex=next;
  jumpSelect.value=String(activeIndex);
  sectionNodes[activeIndex].scrollIntoView({behavior:"auto",block:"start"});
}

prevBtn.onclick=()=>goTo(activeIndex-1);
nextBtn.onclick=()=>goTo(activeIndex+1);
jumpSelect.onchange=e=>goTo(Number(e.target.value));

async function load(){
  try{
    const res=await fetch(API_URL);
    const json=await res.json();
    render(json?.data||[]);
  }catch{
    slider.innerHTML='<div class="empty">Load failed</div>';
  }
}

load();
</script>

</body>
</html>
